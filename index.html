<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopSalão Agendamentos</title>
    <style>
        :root {
            --bg: #050608;
            --card: #12141d;
            --gold: #dfb11b;
            --cyan: #00f2ff;
            --text: #ffffff;
            --dim: #6d6a6a;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ff4b4b;
            --success: #28a745;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container { 
            width: 100%; max-width: 420px; background: radial-gradient(circle at top, #12141d 0%, var(--bg) 100%); 
            display: flex; flex-direction: column; border: 1px solid var(--border); position: relative;
        }

        header { padding: 25px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-img {
            width: 250px; height: 250px;
            border-radius: 50%; border: 2px solid var(--gold);
            margin: 0 auto 10px auto; display: block;
            object-fit: cover; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .logo { font-size: 1.5rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        main { padding: 20px; flex-grow: 1; }
        .hidden { display: none !important; }

        .calendar-wrap { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .cal-header { display: flex; justify-content: space-between; color: var(--gold); font-weight: bold; margin-bottom: 15px; font-size: 0.9rem; align-items: center; }
        .nav-btn { cursor: pointer; padding: 5px 15px; background: rgba(255,255,255,0.05); border-radius: 5px; user-select: none; }
        
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .weekday { font-size: 0.6rem; color: var(--gold); padding-bottom: 5px; }
        .day { padding: 10px 0; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; border: 1px solid transparent; }
        .day:hover:not(.empty) { border-color: var(--gold); }
        .day.selected { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .day.has-event { border-bottom: 2px solid var(--cyan); }

        .btn-access { width: 100%; padding: 20px; margin: 10px 0; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: none; font-size: 0.9rem; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .btn-outline { background: transparent; color: var(--dim); border: 1px solid var(--border); }
        
        .label { color: var(--gold); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1.5px; }
        select, input { width: 100%; background: #1a1c26; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 1rem; }

        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { background: var(--border); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .slot.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,242,255,0.1); border: 1px solid var(--cyan); }

        #modal-senha { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .card-pro { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--cyan); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="modal-senha">
        <div style="background:var(--card); padding:30px; border-radius:20px; width:85%; text-align:center; border:1px solid var(--gold);">
            <h3 style="margin-bottom:20px; color:var(--gold);">Acesso Restrito</h3>
            <input type="password" id="input-senha" placeholder="Senha do Barbeiro" style="text-align: center;">
            <button class="btn-access btn-gold" onclick="validarSenha()">Entrar no Painel</button>
            <button onclick="fecharSenha()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Voltar</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/100/100346.png'">
            <h1 class="logo">TopSalão</h1>
        </header>

        <main id="home">
            <div style="height: 35vh; display: flex; flex-direction: column; justify-content: center; gap: 10px;">
                <button class="btn-access btn-gold" onclick="irPara('cliente')">Agendar Meu Horário</button>
                <button class="btn-access btn-outline" onclick="abrirSenha()">Painel do Barbeiro</button>
            </div>
        </main>

        <main id="cliente" class="hidden">
            <button onclick="irPara('home')" style="background:none; border:none; color:var(--gold); margin-bottom:15px; cursor:pointer;">← Início</button>
            
            <span class="label">1. Escolha o dia do mês</span>
            <div class="calendar-wrap">
                <div class="cal-header">
                    <span class="nav-btn" onclick="mudarMes(-1)">‹</span>
                    <span id="mes-nome-cliente">ABRIL 2026</span>
                    <span class="nav-btn" onclick="mudarMes(1)">›</span>
                </div>
                <div class="days-grid" id="cal-days-cliente"></div>
            </div>

            <div id="fluxo-horario" class="hidden">
                <span class="label">2. Escolha o serviço</span>
                <select id="servico" onchange="gerarHorarios()">
                    <option value="40">Cabelo (40 minutos)</option>
                    <option value="40">Barba (40 minutos)</option>
                    <option value="60">Cabelo + Barba (60 minutos)</option>
                </select>

                <span class="label">3. Horários Disponíveis</span>
                <div class="time-grid" id="lista-horarios"></div>

                <div id="finalizar" class="hidden" style="margin-top:25px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <input type="text" id="nome-cliente" placeholder="Qual seu nome e celular?">
                    <button class="btn-access btn-gold" onclick="confirmarAgendamento()">Confirmar Agendamento</button>
                </div>
            </div>
        </main>

        <main id="pro" class="hidden">
            <button onclick="irPara('home')" style="background:none; border:none; color:var(--gold); margin-bottom:15px; cursor:pointer;">← Sair do Painel</button>
            
            <span class="label">Filtrar Agenda</span>
            <div class="calendar-wrap">
                <div class="cal-header">
                    <span class="nav-btn" onclick="mudarMes(-1)">‹</span>
                    <span id="mes-nome-pro">ABRIL 2026</span>
                    <span class="nav-btn" onclick="mudarMes(1)">›</span>
                </div>
                <div class="days-grid" id="cal-days-pro"></div>
            </div>

            <h2 class="label" id="label-dia-pro" style="color: var(--cyan);">Agenda</h2>
            <div id="lista-agendamentos"></div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
            <button class="btn-access" style="background: var(--success); color: white;" onclick="baixarTXT()">BAIXAR AGENDA COMPLETA (.TXT)</button>
            <input type="text" id="input-importar" placeholder="Cole o código do backup aqui">
            <button class="btn-access btn-outline" onclick="importarTXT()">Restaurar Backup</button>
        </main>
    </div>

    <script>
        const SENHA_PRO = "1234";
        const START = 6 * 60;
        const END = 22 * 60;
        
        let agendaGlobal = JSON.parse(localStorage.getItem('salao_elite_db')) || [];
        
        // CONTROLE DE DATA DINÂMICA
        let dataFoco = new Date(); // Começa no mês atual
        let mesAtual = dataFoco.getMonth();
        let anoAtual = dataFoco.getFullYear();

        let diaFocoCliente = null;
        let diaFocoPro = dataFoco.getDate();
        let slotSelecionado = null;

        const NOMES_MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];

        function atualizarStorage() {
            localStorage.setItem('salao_elite_db', JSON.stringify(agendaGlobal));
        }

        function mudarMes(direcao) {
            mesAtual += direcao;
            if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
            if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
            renderCalendario(document.getElementById('cliente').classList.contains('hidden') ? 'pro' : 'cliente');
        }

        function irPara(tela) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById(tela).classList.remove('hidden');
            renderCalendario(tela);
        }

        function renderCalendario(tipo) {
            if (tipo === 'home') return;
            const gridId = tipo === 'cliente' ? 'cal-days-cliente' : 'cal-days-pro';
            const nomeMesId = tipo === 'cliente' ? 'mes-nome-cliente' : 'mes-nome-pro';
            const grid = document.getElementById(gridId);
            
            document.getElementById(nomeMesId).innerText = `${NOMES_MESES[mesAtual]} ${anoAtual}`;
            
            grid.innerHTML = `<div class="weekday">D</div><div class="weekday">S</div><div class="weekday">T</div><div class="weekday">Q</div><div class="weekday">Q</div><div class="weekday">S</div><div class="weekday">S</div>`;

            // Lógica para calcular dias do mês
            const primeiroDiaSemana = new Date(anoAtual, mesAtual, 1).getDay();
            const diasNoMes = new Date(anoAtual, mesAtual + 1, 0).getDate();

            // Espaços vazios
            for(let i=0; i<primeiroDiaSemana; i++) grid.innerHTML += '<div class="day empty"></div>';
            
            for(let d=1; d<=diasNoMes; d++) {
                const temEvento = agendaGlobal.some(a => a.dia == d && a.mes == mesAtual && a.ano == anoAtual);
                const selecionado = (tipo === 'cliente' && diaFocoCliente == d) || (tipo === 'pro' && diaFocoPro == d);
                
                const diaDiv = document.createElement('div');
                diaDiv.className = `day ${temEvento ? 'has-event' : ''} ${selecionado ? 'selected' : ''}`;
                diaDiv.innerText = d;
                diaDiv.onclick = () => {
                    if(tipo === 'cliente') {
                        diaFocoCliente = d;
                        document.getElementById('fluxo-horario').classList.remove('hidden');
                        gerarHorarios();
                    } else {
                        diaFocoPro = d;
                        renderProList();
                    }
                    renderCalendario(tipo);
                };
                grid.appendChild(diaDiv);
            }
            if(tipo === 'pro') renderProList();
        }

        function gerarHorarios() {
            const duracao = parseInt(document.getElementById('servico').value);
            const container = document.getElementById('lista-horarios');
            container.innerHTML = "";
            document.getElementById('finalizar').classList.add('hidden');

            for (let t = START; t + duracao <= END; t += duracao) {
                const ocupado = agendaGlobal.some(a => 
                    a.dia == diaFocoCliente && a.mes == mesAtual && a.ano == anoAtual &&
                    ((t >= a.inicio && t < a.fim) || (t + duracao > a.inicio && t + duracao <= a.fim))
                );

                if (!ocupado) {
                    const h = Math.floor(t / 60).toString().padStart(2, '0');
                    const m = (t % 60).toString().padStart(2, '0');
                    const div = document.createElement('div');
                    div.className = 'slot';
                    div.innerText = `${h}:${m}`;
                    div.onclick = () => {
                        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                        div.classList.add('active');
                        slotSelecionado = { inicio: t, fim: t + duracao };
                        document.getElementById('finalizar').classList.remove('hidden');
                    };
                    container.appendChild(div);
                }
            }
        }

        function confirmarAgendamento() {
            const nome = document.getElementById('nome-cliente').value;
            if(!nome) return alert("Por favor, digite seu nome!");
            
            agendaGlobal.push({ 
                dia: diaFocoCliente, 
                mes: mesAtual, 
                ano: anoAtual,
                inicio: slotSelecionado.inicio, 
                fim: slotSelecionado.fim, 
                nome: nome, 
                servico: document.getElementById('servico').options[document.getElementById('servico').selectedIndex].text 
            });

            atualizarStorage();
            alert(`Agendado com sucesso para ${diaFocoCliente} de ${NOMES_MESES[mesAtual]}!`);
            location.reload(); // Atualiza para limpar o amarelo e resetar
        }

        function abrirSenha() { document.getElementById('modal-senha').style.display = 'flex'; }
        function fecharSenha() { document.getElementById('modal-senha').style.display = 'none'; }
        function validarSenha() { if(document.getElementById('input-senha').value === SENHA_PRO) { fecharSenha(); irPara('pro'); } else { alert("Senha Incorreta!"); } }

        function renderProList() {
            const lista = document.getElementById('lista-agendamentos');
            lista.innerHTML = "";
            const eventosDoDia = agendaGlobal.filter(a => a.dia == diaFocoPro && a.mes == mesAtual && a.ano == anoAtual).sort((a,b) => a.inicio - b.inicio);
            
            document.getElementById('label-dia-pro').innerText = `Agenda: ${diaFocoPro}/${mesAtual+1}/${anoAtual}`;

            if(eventosDoDia.length === 0) {
                lista.innerHTML = `<div class="empty-state">Sem agendamentos.</div>`;
                return;
            }

            eventosDoDia.forEach((a) => {
                const hI = Math.floor(a.inicio / 60).toString().padStart(2, '0');
                const mI = (a.inicio % 60).toString().padStart(2, '0');
                const idx = agendaGlobal.indexOf(a);
                lista.innerHTML += `<div class="card-pro">
                    <div><b style="color:var(--cyan)">${hI}:${mI}</b><br><span>${a.nome}</span><br><small style="color:var(--gold)">${a.servico}</small></div>
                    <button onclick="cancelar(${idx})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.3rem;">✖</button>
                </div>`;
            });
        }

        function cancelar(i) { if(confirm("Remover?")) { agendaGlobal.splice(i, 1); atualizarStorage(); renderCalendario('pro'); } }
        function baixarTXT() { const blob = new Blob([JSON.stringify(agendaGlobal)], { type: 'text/plain' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `agenda_salao.txt`; link.click(); }
        function importarTXT() { try { agendaGlobal = JSON.parse(document.getElementById('input-importar').value); atualizarStorage(); location.reload(); } catch(e) { alert("Erro!"); } }
    </script>
</body>
</html>
